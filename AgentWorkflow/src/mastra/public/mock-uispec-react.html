<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Spec React Mock</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap {
        max-width: 1200px;
        margin: 20px auto;
        padding: 0 16px;
        display: grid;
        gap: 16px;
        grid-template-columns: 1fr 1fr;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      h1 { margin: 0 0 8px; font-size: 18px; }
      .hint { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
      textarea {
        width: 100%;
        min-height: 520px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        resize: vertical;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .actions { display: flex; gap: 8px; margin-top: 8px; }
      button {
        background: #111827;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
      }
      .error { color: #b91c1c; font-size: 12px; white-space: pre-wrap; margin-top: 8px; }

      .slide {
        border: 2px solid var(--border);
        border-radius: 14px;
        min-height: 520px;
        padding: 16px;
        background: #fff;
      }
      .title { margin: 0 0 8px; font-size: 26px; line-height: 1.2; }
      .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
      .chip {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
      }
      .element {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px;
        margin-bottom: 8px;
        animation: fadeIn 350ms ease;
      }
      .element-label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .05em;
        margin-bottom: 3px;
      }
      .quiz {
        margin-top: 14px;
        border-top: 1px dashed var(--border);
        padding-top: 12px;
      }
      .q { margin-bottom: 12px; }
      .q-title { font-weight: 600; margin-bottom: 6px; }
      .opt {
        display: block;
        width: 100%;
        text-align: left;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        border-radius: 8px;
        padding: 8px;
        margin: 5px 0;
      }
      .opt.correct { border-color: #16a34a; background: #f0fdf4; }
      .opt.wrong { border-color: #dc2626; background: #fef2f2; }
      .notes {
        margin-top: 12px;
        font-size: 13px;
        color: #374151;
        background: #f9fafb;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (max-width: 900px) {
        .wrap { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const sampleUiSpec = {
        version: "1.0",
        mode: "QuizReact",
        title: "TCP: Transmission Control Protocol",
        theme: {
          primaryColor: "#1a73e8",
          fontTitle: "Inter",
          fontBody: "Inter"
        },
        elements: [
          {
            type: "ADD_TEXT_BOX",
            content: "TCP guarantees reliable, ordered delivery.",
            animation: "FADE_IN",
            order: 1
          },
          {
            type: "ADD_SHAPE",
            content: "SYN -> SYN-ACK -> ACK",
            animation: "FLY_IN_FROM_LEFT",
            order: 2
          }
        ],
        interaction: {
          type: "QUIZ",
          items: [
            {
              question: "Correct handshake order?",
              options: ["SYN, SYN-ACK, ACK", "ACK, SYN, SYN-ACK"],
              answer: "SYN, SYN-ACK, ACK"
            }
          ]
        },
        speakerNotes: "Use phone-call analogy for handshake."
      };

      function QuizBlock({ items }) {
        const [selected, setSelected] = React.useState({});

        return (
          <div className="quiz">
            {items.map((item, idx) => {
              const picked = selected[idx];
              return (
                <div className="q" key={idx}>
                  <div className="q-title">{idx + 1}. {item.question}</div>
                  {(item.options || []).map((opt, i) => {
                    let cls = "opt";
                    if (picked) {
                      if (opt === item.answer) cls += " correct";
                      else if (opt === picked) cls += " wrong";
                    }
                    return (
                      <button
                        key={i}
                        className={cls}
                        onClick={() => setSelected((s) => ({ ...s, [idx]: opt }))}
                      >
                        {opt}
                      </button>
                    );
                  })}
                </div>
              );
            })}
          </div>
        );
      }

      function SlideRenderer({ uiSpec }) {
        const color = uiSpec.theme?.primaryColor || "#1a73e8";
        const titleFont = uiSpec.theme?.fontTitle || "Inter";

        return (
          <div className="slide" style={{ borderColor: color }}>
            <h2 className="title" style={{ color, fontFamily: titleFont }}>{uiSpec.title || "Untitled"}</h2>
            <div className="chips">
              <span className="chip">Mode: {uiSpec.mode}</span>
              <span className="chip">Interaction: {uiSpec.interaction?.type || "NONE"}</span>
            </div>

            {(uiSpec.elements || []).map((el, idx) => (
              <div className="element" key={idx}>
                <div className="element-label">{el.type} {el.order ? `#${el.order}` : ""}</div>
                <div>{el.content}</div>
              </div>
            ))}

            {uiSpec.interaction?.type === "QUIZ" && Array.isArray(uiSpec.interaction?.items) ? (
              <QuizBlock items={uiSpec.interaction.items} />
            ) : null}

            <div className="notes">
              <strong>Speaker notes:</strong> {uiSpec.speakerNotes || "None"}
            </div>
          </div>
        );
      }

      function App() {
        const [input, setInput] = React.useState(JSON.stringify(sampleUiSpec, null, 2));
        const [uiSpec, setUiSpec] = React.useState(sampleUiSpec);
        const [error, setError] = React.useState("");

        const onRender = () => {
          setError("");
          try {
            const parsed = JSON.parse(input);
            setUiSpec(parsed);
          } catch (e) {
            setError(`Invalid JSON: ${e.message}`);
          }
        };

        return (
          <div className="wrap">
            <section className="panel">
              <h1>React uiSpec Input</h1>
              <div className="hint">Paste workflow uiSpec JSON and render it using React.</div>
              <textarea value={input} onChange={(e) => setInput(e.target.value)} />
              <div className="actions">
                <button onClick={onRender}>Render In React</button>
              </div>
              {error ? <div className="error">{error}</div> : null}
            </section>

            <section className="panel">
              <h1>React Render Preview</h1>
              <SlideRenderer uiSpec={uiSpec} />
            </section>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
