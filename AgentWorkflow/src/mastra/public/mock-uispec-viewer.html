<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Spec Mock Viewer</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      .muted { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
      textarea {
        width: 100%;
        min-height: 520px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }
      button {
        margin-top: 10px;
        background: #111827;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
      }
      .slide {
        border: 2px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        min-height: 520px;
        background: white;
      }
      .title {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }
      .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
      .chip {
        background: #eef2ff;
        color: #3730a3;
        font-size: 12px;
        border-radius: 999px;
        padding: 4px 8px;
      }
      .block {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 8px;
      }
      .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
      .err {
        margin-top: 8px;
        color: #b91c1c;
        font-size: 12px;
        white-space: pre-wrap;
      }
      @media (max-width: 900px) {
        .wrap { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="panel">
        <h1>UI Spec Input</h1>
        <div class="muted">Paste workflow uiSpec JSON and click Render.</div>
        <textarea id="input"></textarea>
        <button id="renderBtn">Render Mock Slide</button>
        <div id="error" class="err"></div>
      </section>

      <section class="panel">
        <h1>Mock Display</h1>
        <div id="slide" class="slide"></div>
      </section>
    </div>

    <script>
      const sample = {
        version: "1.0",
        mode: "QuizReact",
        title: "TCP: Transmission Control Protocol",
        theme: {
          primaryColor: "#1a73e8",
          fontTitle: "Inter",
          fontBody: "Inter"
        },
        elements: [
          { type: "ADD_TEXT_BOX", content: "TCP provides reliable, ordered delivery.", animation: "FADE_IN", order: 1 },
          { type: "ADD_SHAPE", content: "SYN -> SYN-ACK -> ACK", animation: "FLY_IN_FROM_LEFT", order: 2 }
        ],
        interaction: {
          type: "QUIZ",
          items: [
            { question: "Handshake order?", options: ["SYN,SYN-ACK,ACK", "ACK,SYN,SYN-ACK"], answer: "SYN,SYN-ACK,ACK" }
          ]
        },
        speakerNotes: "Ask students to compare TCP with UDP."
      };

      const input = document.getElementById('input');
      const slide = document.getElementById('slide');
      const err = document.getElementById('error');
      const btn = document.getElementById('renderBtn');

      input.value = JSON.stringify(sample, null, 2);

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function render(spec) {
        const title = spec.title || 'Untitled Slide';
        const mode = spec.mode || 'UnknownMode';
        const interactionType = spec.interaction?.type || 'NONE';
        const items = Array.isArray(spec.interaction?.items) ? spec.interaction.items : [];
        const elements = Array.isArray(spec.elements) ? spec.elements : [];
        const notes = spec.speakerNotes || '';
        const color = spec.theme?.primaryColor || '#1a73e8';
        const titleFont = spec.theme?.fontTitle || 'Inter, sans-serif';
        const bodyFont = spec.theme?.fontBody || 'Inter, sans-serif';

        slide.style.borderColor = color;
        slide.style.fontFamily = bodyFont;

        const elementsHtml = elements
          .map((e) => `<div class="block"><div class="label">${escapeHtml(e.type || 'ELEMENT')} ${e.order ? `#${escapeHtml(e.order)}` : ''}</div><div>${escapeHtml(e.content || '')}</div></div>`)
          .join('');

        const itemsHtml = items.length
          ? `<pre class="block" style="overflow:auto;">${escapeHtml(JSON.stringify(items, null, 2))}</pre>`
          : '<div class="block">No interaction items.</div>';

        slide.innerHTML = `
          <h2 class="title" style="font-family:${escapeHtml(titleFont)}; color:${escapeHtml(color)};">${escapeHtml(title)}</h2>
          <div class="chips">
            <span class="chip">Mode: ${escapeHtml(mode)}</span>
            <span class="chip">Interaction: ${escapeHtml(interactionType)}</span>
          </div>
          <div class="label">Elements</div>
          ${elementsHtml || '<div class="block">No elements.</div>'}
          <div class="label">Interaction Items</div>
          ${itemsHtml}
          <div class="label">Speaker Notes</div>
          <div class="block">${escapeHtml(notes) || 'None'}</div>
        `;
      }

      btn.addEventListener('click', () => {
        err.textContent = '';
        try {
          const parsed = JSON.parse(input.value);
          render(parsed);
        } catch (e) {
          err.textContent = 'Invalid JSON:\n' + e.message;
        }
      });

      render(sample);
    </script>
  </body>
</html>
